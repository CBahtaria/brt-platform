version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      retries: 10

  brt-api:
    image: ghcr.io/cbahtaria/brt-platform:latest
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - /tmp:/tmp
      - ./custom-plugins:/app/custom_plugins:ro
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
